# yaml-language-server: $schema=https://raw.githubusercontent.com/Kometa-Team/Kometa/nightly/json-schema/config-schema.json

#######################################
#  KOMETA MERGED CONFIGURATION        #
#  TV Shows + Movies + Trakt          #
#  Created: 2026-07-21               #
#  Run Schedule: Daily @ 05:00        #
#  Collections: Weekly Mon            #
#  Overlays: Sun + Wed (2x/week)      #
#######################################

# 🔐 SECURITY NOTES:
# Tokens are hardcoded below. To rotate:
#   1. Update values in this file
#   2. Restart container: docker compose up -d
#   3. Keep backup of old tokens somewhere secure

plex:
  url: https://192-168-42-50.e0b1c53d7abd46fba674d7e15f4be32b.plex.direct:32400
  token: REDACTED
  timeout: 60
  db_cache: 1024
  clean_bundles: true
  empty_trash: true
  optimize: true
  verify_ssl: true

tmdb:
  apikey: REDACTED
  cache_expiration: 60
  language: en
  region: US

mdblist:
  apikey: REDACTED
  cache_expiration: 60

############################################
#  TRAKT - ENABLED FOR COLLECTIONS/PLAYLISTS
############################################
trakt:
  authorization:
    access_token: REDACTED
    created_at: '1784050244'
    expires_in: 604799
    refresh_token: REDACTED
    scope: public
    token_type: Bearer
  client_id: REDACTED
  client_secret: REDACTED
  force_refresh: false

tautulli:
  url: https://tautulli.mattogno.com
  apikey: h3e_DEISS2__RPXhv3_IX0aDlPFz1fUI

github:
  token: REDACTED

settings:
  asset_depth: 4
  asset_directory: []
  asset_folders: true
  cache: true
  cache_expiration: 60
  create_asset_folders: true
  custom_repo: https://raw.githubusercontent.com/cmattogno/kometa-custom/main/
  default_collection_order: release
  delete_below_minimum: false
  delete_not_scheduled: false
  dimensional_asset_rename: true
  download_url_assets: true
  minimum_items: 2
  missing_only_released: true
  only_filter_missing: true
  overlay_artwork_filetype: png
  overlay_artwork_quality: 90
  playlist_report: true
  prioritize_assets: true
  run_again_delay: 4
  run_order:
    - operations
    - metadata
    - overlays
    - collections
  save_report: true
  show_asset_not_needed: true
  show_filtered: true
  show_missing: false
  show_missing_assets: true
  show_missing_episode_assets: false
  show_missing_season_assets: false
  show_options: true
  show_unconfigured: true
  show_unfiltered: true
  show_unmanaged: true
  sync_mode: sync
  tvdb_language: eng
  verify_ssl: true

libraries:
################################################################################
#                                    TV SHOWS                                  #
################################################################################
  TV Shows:
    template_variables:
      language: en

    metadata_files:
      # Your existing TV metadata
      - repo: TV/metadata/xfiles.movies.tvdb.yaml

    collection_files:
      # ===== ESSENTIAL CORE =====
      - default: basic
        schedule: weekly(monday)
        template_variables:
          visible_library: true
          visible_shared: true

      - default: genre
        schedule: weekly(monday)
        template_variables:
          visible_library: true
          visible_shared: true

      # ===== AWARD RECOGNITION =====
      - default: emmy
        schedule: weekly(monday)
        template_variables:
          visible_library: true
          visible_shared: true
          collection_order: release.asc

      # ===== ORGANIZATIONAL =====
      - default: decade
        schedule: weekly(monday)
        template_variables:
          visible_library: true
          visible_shared: true

      - default: based
        schedule: weekly(monday)
        template_variables:
          visible_library: true
          visible_shared: true

      - default: actor
        schedule: weekly(monday)
        template_variables:
          style: signature
          exclude:
            - Ryan Reynolds
            - Jack Black
          visible_library: true
          visible_shared: true
          sort_by: title.asc
          data:
            limit: 35

      # ===== OPTIONAL =====
      - default: universe
        schedule: weekly(monday)
        template_variables:
          visible_library: true
          visible_shared: true
          collection_order: release.asc

      - default: tautulli
        schedule: weekly(monday)
        template_variables:
          use_watched: false
          visible_library: true
          visible_shared: true
          collection_order: release.asc

      # ===== TRAKT COLLECTIONS =====
      - default: trakt
        schedule: weekly(monday)
        template_variables:
          visible_library: true
          visible_shared: true

      # ===== CUSTOM REPOSITORIES =====
      - repo: TV/collections/MythArcX.yaml
        schedule: weekly(monday)

      - repo: TV/collections/StarTrek-aired.yml
        schedule: weekly(monday)

    overlay_files:
      - default: ribbon

      - default: status
        schedule_overlays: weekly(sunday|wednesday)
        template_variables:
          back_color_airing: '#016920FF'
          back_color_returning: '#81007FFF'
          back_color_canceled: '#B52222FF'
          back_color_ended: '#000847FF'

      - default: ratings
        schedule_overlays: weekly(sunday|wednesday)
        template_variables:
          rating1: user
          rating1_image: rt_tomato
          rating1_font: config/fonts/LibreFranklin-Bold.ttf
          horizontal_position: left
          vertical_position: center

      - default: commonsense
        template_variables:
          horizontal_offset: 0
          vertical_offset: 150

      - default: languages
        template_variables:
          use_subtitles: true

    settings:
      asset_directory:
        - /Kometa_assets/TV
      prioritize_assets: true

    operations:
      assets_for_all: true
      assets_for_all_collections: true
      mass_added_at_update:
        - mdb
        - mdb_digital
        - tvdb
      mass_audience_rating_update:
        - tmdb
      mass_critic_rating_update:
        - mdb_metacritic
        - mdb_tmdb
        - mdb_tomatoes
      mass_user_rating_update:
        - mdb_tomatoesaudience

################################################################################
#                                   MOVIES                                     #
################################################################################
  Movies:
    template_variables:
      language: en

    metadata_files:
      # Add your movie metadata files here
      # Example structures:
      # - repo: Movies/metadata/ratings.yml
      # - file: config/movies-mass-update.yml
      # Replace these placeholders with your actual files
      - repo: Movies/metadata/ratings.yml

    collection_files:
      # ===== ESSENTIAL CORE =====
      - default: basic
        schedule: weekly(monday)
        template_variables:
          visible_library: true
          visible_shared: true

      - default: genre
        schedule: weekly(monday)
        template_variables:
          visible_library: true
          visible_shared: true

      # ===== ORGANIZATIONAL =====
      - default: decade
        schedule: weekly(monday)
        template_variables:
          visible_library: true
          visible_shared: true

      - default: actor
        schedule: weekly(monday)
        template_variables:
          style: signature
          exclude: []
          visible_library: true
          visible_shared: true
          sort_by: title.asc
          data:
            limit: 40

      # ===== PRESTIGE / DISCOVERY =====
      - default: top-rated
        schedule: weekly(monday)
        template_variables:
          visible_library: true
          visible_shared: true

      - default: director
        schedule: weekly(monday)
        template_variables:
          visible_library: true
          visible_shared: true
          data:
            minimum: 5

      # ===== TRAKT COLLECTIONS =====
      - default: trakt
        schedule: weekly(monday)
        template_variables:
          visible_library: true
          visible_shared: true

      # ===== OPTIONAL =====
      # - default: franchise             # ⚠️ Only if you want inline franchise collections
      #   schedule: weekly(monday)
      #   template_variables:
      #     visible_library: true
      #     visible_shared: true

      - default: tautulli
        schedule: weekly(monday)
        template_variables:
          use_watched: false
          visible_library: true
          visible_shared: true
          collection_order: release.asc

    overlay_files:
      - default: ribbon

      - default: status
        schedule_overlays: weekly(sunday|wednesday)
        template_variables:
          back_color_unwatched: '#808080FF'
          back_color_watched: '#016920FF'
          back_color_planned: '#005B99FF'
          back_color_pending: '#CC9900FF'

      - default: ratings
        schedule_overlays: weekly(sunday|wednesday)
        template_variables:
          rating1: user
          rating1_image: rt_tomato
          rating1_font: config/fonts/LibreFranklin-Bold.ttf
          horizontal_position: left
          vertical_position: center

      - default: commonsense
        template_variables:
          horizontal_offset: 0
          vertical_offset: 150

      - default: content_rating
        template_variables:
          show_all_ratings: true

    settings:
      asset_directory:
        - /Kometa_assets/Movies
      prioritize_assets: true

    operations:
      assets_for_all: true
      assets_for_all_collections: true
      mass_added_at_update:
        - mdb
        - mdb_digital
        - tmdb
      mass_audience_rating_update:
        - tmdb
      mass_critic_rating_update:
        - mdb_metacritic
        - mdb_tmdb
        - mdb_tomatoes
      mass_user_rating_update:
        - mdb_tomatoesaudience

############################################
#  GLOBAL PLAYLISTS (Using Trakt)
############################################
playlist_files:
  # Add your global playlist files here
