collections:
  # The name of the collection as it will appear in Plex
  Heists and Cons Collection:
    # The direct URL to the Trakt list
    trakt_list: https://trakt.tv/lists/22230698
    # Keeps the collection in the exact same order as the Trakt list
    collection_order: custom
    # Ensures Plex removes items if they are removed from the Trakt list
    sync_mode: sync
    # Optional: Prevents the collection from cluttering your home screen or library list
    visible_home: false
    visible_library: true
